apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 11-vuln-scanner
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/planb438/Kubernetes-CKS-Security-Labs.git
    targetRevision: HEAD
    path: security-GitOps-portfolio/clusters/cks-lab/manifests/11-sbom-vuln-scan/scanning
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: sbom-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true